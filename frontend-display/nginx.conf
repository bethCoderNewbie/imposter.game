server {
  listen 80;

  # Serve the display SPA at /display/.
  # alias strips the /display/ prefix so nginx looks up files under /usr/share/nginx/html/.
  # The display app uses query-param routing (?g=xxx), not path-based React Router,
  # so no try_files SPA fallback is needed — index.html is served for the bare prefix,
  # and static asset paths (/display/assets/...) resolve directly via alias.
  location /display/ {
    alias /usr/share/nginx/html/;
    index index.html;
  }

  location / {
    return 404;
  }
}
