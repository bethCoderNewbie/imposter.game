# Map $http_upgrade → $connection_upgrade so WebSocket proxying sends
# "Connection: upgrade" during handshake and "Connection: close" for plain HTTP.
# Using a variable here (rather than the hardcoded string "upgrade") is required
# when proxy_pass uses a variable-based upstream; it also prevents Safari's
# stricter WebSocket implementation from rejecting the upgrade response.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
  listen 80;

  # Use Docker's embedded DNS so hostnames are re-resolved after container
  # restarts rather than cached from startup.  Without this, nginx maps each
  # service name to the IP it had at boot and never refreshes; if a container
  # restarts and gets a new IP the proxy silently hits the wrong container.
  resolver 127.0.0.11 valid=30s;
  resolver_timeout 5s;

  # Display TV client — served at /display/
  # Variable in proxy_pass forces nginx to honour the resolver directive.
  location /display/ {
    set $display_upstream frontend-display:80;
    proxy_pass http://$display_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
  }

  # REST API
  location /api/ {
    set $backend_upstream backend:8000;
    proxy_pass http://$backend_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  # WebSocket endpoint
  location /ws/ {
    set $ws_upstream backend:8000;
    proxy_pass http://$ws_upstream;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_read_timeout 3600s;
  }

  # Mobile player client — served at /
  location / {
    set $mobile_upstream frontend-mobile:80;
    proxy_pass http://$mobile_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
  }
}
