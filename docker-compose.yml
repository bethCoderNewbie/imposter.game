services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: werewolf
      POSTGRES_USER: werewolf
      POSTGRES_PASSWORD: werewolf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U werewolf -d werewolf"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  # Ollama LLM service (PRD-008) — internal only, reached by backend at http://ollama:11434
  # GPU acceleration: applied automatically by start.sh when nvidia-smi is detected (docker-compose.gpu.yml override).
  ollama:
    image: ollama/ollama
    profiles: ["llm"]
    volumes:
      - ollama_models:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # One-shot init container: pulls the configured model into the shared volume on first run.
  # Re-run manually if pull fails: docker compose run --rm ollama-pull
  ollama-pull:
    image: ollama/ollama
    profiles: ["llm"]
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["/bin/sh", "-c"]
    command: ["ollama pull ${OLLAMA_MODEL:-llama3.2:3b}"]
    volumes:
      - ollama_models:/root/.ollama
    restart: "no"

  # Kokoro TTS service (PRD-008) — internal only, reached by backend at http://tts:8880
  # GPU acceleration: applied automatically by start.sh when nvidia-smi is detected (docker-compose.gpu.yml override).
  # Opt-in via profile: docker compose --profile tts up
  tts:
    image: ghcr.io/remsky/kokoro-fastapi-cpu:latest
    container_name: kokoro-tts
    profiles: ["tts"]
    expose:
      - "8880"
    ports:
      - "8880:8880"    # host access for prebake script and local dev
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: ./backend-engine/Dockerfile
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql+asyncpg://werewolf:werewolf@postgres/werewolf
      # Narrator settings (PRD-008) — all default to disabled; set NARRATOR_ENABLED=true to activate
      NARRATOR_ENABLED: ${NARRATOR_ENABLED:-false}
      NARRATOR_MODE: ${NARRATOR_MODE:-prebaked}
      OLLAMA_URL: "http://ollama:11434"
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2:3b}
      KOKORO_URL: "http://tts:8880"
      NARRATOR_VOICE: ${NARRATOR_VOICE:-af_bella}
      # Hybrid deployment: makes photo and TTS URLs absolute so Vercel-hosted
      # frontends can load them. Leave empty for pure LAN mode.
      BACKEND_PUBLIC_URL: ${BACKEND_URL:-}
    volumes:
      - photos_data:/app/photos
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
        required: false
    restart: unless-stopped

  frontend-display:
    build:
      context: ./frontend-display
      dockerfile: Dockerfile
      args:
        # Set HOST_IP to the LAN IP of this machine before building, e.g.:
        #   HOST_IP=http://192.168.1.100 docker compose up --build
        # Reads from the shell environment automatically if exported.
        HOST_IP: ${HOST_IP:-}
        # Hybrid deployment: tunnel URL for the QR code ?b= embed only.
        # The display's own API/WS calls always use relative paths (LAN-direct).
        # VITE_BACKEND_URL is intentionally NOT baked here — set it in Vercel
        # project env vars if deploying the display to Vercel.
        QR_BACKEND_URL: ${BACKEND_URL:-}
        # Vercel URL of the mobile frontend. When set, the QR code points here
        # instead of the local LAN IP so internet players can scan and join.
        MOBILE_URL: ${MOBILE_URL:-}
    restart: unless-stopped

  frontend-mobile:
    build:
      context: ./frontend-mobile
      dockerfile: Dockerfile
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend-display
      - frontend-mobile
    restart: unless-stopped

  # ── Hybrid deployment: Cloudflare Tunnel (optional) ──────────────────────────
  # Exposes the local backend publicly over HTTPS without port forwarding.
  # Players' real IP is hidden — they only see the *.trycloudflare.com URL.
  #
  # Named tunnel (stable URL, requires CLOUDFLARE_TUNNEL_TOKEN in .env):
  #   ./start.sh --tunnel
  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    restart: unless-stopped
    depends_on:
      - nginx
    profiles: ["tunnel"]

  # Ephemeral quick tunnel — no Cloudflare account or token needed.
  # Prints the https://xxxx.trycloudflare.com URL in its container logs.
  # The display QR code automatically embeds this URL via ?b= — no Vercel redeploy needed.
  #   ./start.sh --tunnel-quick
  cloudflared-quick:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate --url http://nginx:80
    restart: unless-stopped
    depends_on:
      - nginx
    profiles: ["tunnel-quick"]

volumes:
  ollama_models:   # persists downloaded models across compose restarts
  photos_data:     # persists player avatar photos across container restarts
