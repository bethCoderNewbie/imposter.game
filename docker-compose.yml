services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped

  # Kokoro TTS service (PRD-008) — internal only, reached by backend at http://tts:8880
  tts:
    image: ghcr.io/remsky/kokoro-fastapi-gpu:latest
    container_name: kokoro-tts
    expose:
      - "8880"      # internal Docker network only; no host port exposed
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: ./backend-engine/Dockerfile
    environment:
      REDIS_URL: redis://redis:6379
      # Narrator settings (PRD-008) — all default to disabled; set NARRATOR_ENABLED=true to activate
      NARRATOR_ENABLED: ${NARRATOR_ENABLED:-false}
      OLLAMA_URL: "http://host.docker.internal:11434"
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2:3b}
      KOKORO_URL: "http://tts:8880"
      NARRATOR_VOICE: ${NARRATOR_VOICE:-af_bella}
    extra_hosts:
      - "host.docker.internal:host-gateway"   # reach Ollama running on the host
    depends_on:
      - redis
      - tts
    restart: unless-stopped

  frontend-display:
    build:
      context: ./frontend-display
      dockerfile: Dockerfile
      args:
        # Set HOST_IP to the LAN IP of this machine before building, e.g.:
        #   HOST_IP=http://192.168.1.100 docker compose up --build
        # Reads from the shell environment automatically if exported.
        HOST_IP: ${HOST_IP:-}
    restart: unless-stopped

  frontend-mobile:
    build:
      context: ./frontend-mobile
      dockerfile: Dockerfile
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend-display
      - frontend-mobile
    restart: unless-stopped
